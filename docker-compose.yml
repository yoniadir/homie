services:
  mysql:
    image: mysql:8.0
    container_name: homie_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-homie_db}
      MYSQL_USER: ${DB_USER:-homie_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-homie_pass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - homie_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  api:
    build: .
    container_name: homie_api
    env_file: .env
    environment:
      - NODE_ENV=production
      - DOCKER_ENV=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-homie_user}
      - DB_PASSWORD=${DB_PASSWORD:-homie_pass}
      - DB_NAME=${DB_NAME:-homie_db}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - PROXY_URL=${PROXY_URL:-}
      - PUPPETEER_HEADLESS=true
    ports:
      - "3001:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - homie_network
    volumes:
      - ./exports:/app/exports
      - ./browser-profile-docker-api:/app/browser-profile-docker

  scheduler:
    build: .
    container_name: homie_scheduler
    env_file: .env
    environment:
      - NODE_ENV=production
      - DOCKER_ENV=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=${DB_USER:-homie_user}
      - DB_PASSWORD=${DB_PASSWORD:-homie_pass}
      - DB_NAME=${DB_NAME:-homie_db}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID:-}
      - SCRAPE_CRON=${SCRAPE_CRON:-0,30 8-23 * * *}
      - PROXY_URL=${PROXY_URL:-}
      - PUPPETEER_HEADLESS=${PUPPETEER_HEADLESS:-false}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - homie_network
    volumes:
      - ./exports:/app/exports
      - ./browser-profile-docker-scheduler:/app/browser-profile-docker
    command: ["/bin/sh", "-c", "/usr/bin/xvfb-run -a npm run scheduler:start"]
    profiles:
      - scheduler

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: homie_phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - homie_network

volumes:
  mysql_data:

networks:
  homie_network:
    driver: bridge 